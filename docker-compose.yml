services:
  postgres:
    image: postgres:16-alpine
    container_name: sourcebook-postgres
    environment:
      POSTGRES_USER: sourcebook
      POSTGRES_PASSWORD: sourcebook
      POSTGRES_DB: sourcebook
    ports:
      - "5432:5432"

    volumes:
      - sourcebook_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcebook -d sourcebook"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sourcebook-redis
    ports:
      - "6379:6379"
    volumes:
      - sourcebook_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sourcebook_pg_data:
  sourcebook_redis_data:
